            { id: "Perc_Bar_16", text: "16. ค่าใช้จ่ายในการรักษาเป็นอุปสรรคสำคัญสำหรับฉัน" },
            { id: "Perc_Bar_17", text: "17. การปรับเปลี่ยนอาหารพื้นถิ่นทำได้ยากสำหรับฉัน" },
            { id: "Perc_Bar_18", text: "18. ภาระงานทำให้ฉันไม่มีเวลาออกกำลังกาย" },
            { id: "Perc_Bar_19", text: "19. ฉันกังวลเรื่องผลข้างเคียงของยาลดไขมัน" },
            { id: "Perc_Bar_20", text: "20. แรงกดดันจากงานประเพณีทำให้ฉันปฏิเสธอาหารได้ยาก" }
        ];
        const Q_PERC_EFF = [
            { id: "Perc_Eff_21", text: "21. ฉันมั่นใจว่าตนเองสามารถรับประทานยาลดไขมันได้สม่ำเสมอ" },
            { id: "Perc_Eff_22", text: "22. ฉันมั่นใจว่าตนเองสามารถควบคุมอาหารได้แม้อยู่ในงานเลี้ยง" },
            { id: "Perc_Eff_23", text: "23. ฉันมั่นใจว่าตนเองสามารถออกกำลังกายได้สม่ำเสมอ" },
            { id: "Perc_Eff_24", text: "24. ฉันมั่นใจว่าตนเองสามารถมาพบแพทย์ตามนัดได้สม่ำเสมอ" },
            { id: "Perc_Eff_25", text: "25. ฉันมั่นใจว่าตนเองสามารถปรับเปลี่ยนวิถีชีวิตตามคำแนะนำแพทย์ได้" }
        ];

        const Q_SUPP_EMO = [
            { id: "Supp_Emo_1", text: "1. ครอบครัวรับฟังเมื่อฉันมีความกังวลเรื่องสุขภาพ" },
            { id: "Supp_Emo_2", text: "2. คนใกล้ชิดให้กำลังใจฉันในการดูแลสุขภาพสม่ำเสมอ" },
            { id: "Supp_Emo_3", text: "3. แพทย์รับฟังและเข้าใจปัญหาของฉันในการรักษา" },
            { id: "Supp_Emo_4", text: "4. ฉันรู้สึกว่ามีคนห่วงใยและไม่ต้องเผชิญโรคนี้เพียงลำพัง" },
            { id: "Supp_Emo_5", text: "5. อสม. ในชุมชนให้ความเห็นอกเห็นใจเมื่อฉันเผชิญปัญหาสุขภาพ" }
        ];
        const Q_SUPP_APP = [
            { id: "Supp_App_6", text: "6. ครอบครัวชมเชยเมื่อฉันควบคุมอาหารได้สม่ำเสมอ" },
            { id: "Supp_App_7", text: "7. แพทย์ให้ข้อมูลป้อนกลับที่ช่วยให้ฉันปรับพฤติกรรมได้ดีขึ้น" },
            { id: "Supp_App_8", text: "8. คนใกล้ชิดเห็นคุณค่าในความพยายามของฉันในการดูแลสุขภาพ" },
            { id: "Supp_App_9", text: "9. อสม. ช่วยให้ฉันประเมินตนเองว่าควรปรับพฤติกรรมด้านใด" },
            { id: "Supp_App_10", text: "10. แพทย์แจ้งให้ฉันทราบว่าผลการรักษาดีขึ้นหรือแย่ลง" }
        ];
        const Q_SUPP_INFO = [
            { id: "Supp_Info_11", text: "11. แพทย์อธิบายเรื่องโรคให้ฉันเข้าใจได้ชัดเจน" },
            { id: "Supp_Info_12", text: "12. พยาบาลให้คำแนะนำเรื่องอาหารที่เป็นประโยชน์" },
            { id: "Supp_Info_13", text: "13. ครอบครัวแบ่งปันข้อมูลที่เป็นประโยชน์เรื่องโรคไขมันสูง" },
            { id: "Supp_Info_14", text: "14. อสม. ให้คำแนะนำเรื่องการดูแลสุขภาพที่เป็นประโยชน์" },
            { id: "Supp_Info_15", text: "15. ฉันสามารถเข้าถึงข้อมูลด้านสุขภาพที่น่าเชื่อถือได้" }
        ];
        const Q_SUPP_INST = [
            { id: "Supp_Inst_16", text: "16. ครอบครัวช่วยเตรียมอาหารที่เหมาะสมสำหรับผู้ป่วยไขมันสูง" },
            { id: "Supp_Inst_17", text: "17. มีคนอำนวยความสะดวกในการเดินทางมาพบแพทย์" },
            { id: "Supp_Inst_18", text: "18. คนใกล้ชิดช่วยเตือนให้ฉันรับประทานยาสม่ำเสมอ" },
            { id: "Supp_Inst_19", text: "19. ครอบครัวสนับสนุนค่าใช้จ่ายในการรักษา" },
            { id: "Supp_Inst_20", text: "20. ชุมชนมีกิจกรรมส่งเสริมสุขภาพที่ฉันสามารถเข้าร่วมได้" }
        ];

        const App = () => {
            const [mode, setMode] = useState("form");
            // ฝัง URL ลงใน state อัตโนมัติ
            const [gasUrl, setGasUrl] = useState("https://script.google.com/macros/s/AKfycby-gsoXGZECZ6YaLOPf9WbH9NOEFcYUf9y_crQ846nMi4ELApWg96DrewTZwVJMlD0D/exec");
            const [step, setStep] = useState(0); 
            const [formData, setFormData] = useState({ Comorbidity: [], Drugs: [] });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [dashboardData, setDashboardData] = useState([]);
            const [isLoadingDash, setIsLoadingDash] = useState(false);
            const [adminLoggedIn, setAdminLoggedIn] = useState(false);
            const [adminUser, setAdminUser] = useState("");
            const [adminPass, setAdminPass] = useState("");
            const [adminList, setAdminList] = useState([]);
            const [adminLoading, setAdminLoading] = useState(false);
            const [selectedParticipant, setSelectedParticipant] = useState(null);
            const [labEdit, setLabEdit] = useState({});
            const [labSaving, setLabSaving] = useState(false);

            // นำบรรทัด useEffect สำหรับ localStorage ออกได้เลยเพราะฝัง URL คงที่แล้ว
            
            // Auto compute Age_Group from Age
            useEffect(() => {
                if(formData.Age) {
                    const a = Number(formData.Age);
                    const g = a < 40 ? "<40" : a < 50 ? "40-49" : a < 60 ? "50-59" : a < 70 ? "60-69" : ">=70";
                    setFormData(p => ({...p, Age_Group: g}));
                }
            }, [formData.Age]);

            // Auto calculate BMI
            useEffect(() => {
                if(formData.Weight && formData.Height) {
                    const h = parseFloat(formData.Height) / 100;
                    const w = parseFloat(formData.Weight);
                    if(h > 0) {
                        const bmi = (w / (h * h)).toFixed(1);
                        let group = "";
                        if(bmi < 18.5) group = "น้ำหนักต่ำกว่าเกณฑ์ (< 18.5)";
                        else if(bmi < 23) group = "น้ำหนักปกติ (18.5–22.9)";
                        else if(bmi < 25) group = "น้ำหนักเกิน (23.0–24.9)";
                        else if(bmi < 30) group = "โรคอ้วนระดับ 1 (25.0–29.9)";
                        else group = "โรคอ้วนระดับ 2 (≥ 30.0)";
                        setFormData(p => ({...p, BMI: bmi, BMI_Group: group}));
                    }
                }
            }, [formData.Weight, formData.Height]);

            const nextStep = () => {
                if (step === 0 && !gasUrl) return alert("กรุณาระบุ Web App URL");
                setStep(p => p + 1); window.scrollTo(0,0);
            };
            const prevStep = () => { setStep(p => p - 1); window.scrollTo(0,0); };

            const hC = (e) => setFormData(p => ({ ...p, [e.target.name]: e.target.value }));
            const hQS = (name, value) => setFormData(p => ({ ...p, [name]: value }));
            
            const handleCheckbox = (group, value) => {
                setFormData(p => {
                    const curr = p[group] || [];
                    if(curr.includes(value)) return { ...p, [group]: curr.filter(v => v !== value) };
                    return { ...p, [group]: [...curr, value] };
                });
            };

            const handleSubmit = async () => {
                setIsSubmitting(true);
                try {
                    const res = await fetch(gasUrl, { method: "POST", body: JSON.stringify(formData), headers: { "Content-Type": "text/plain;charset=utf-8" }});
                    const result = await res.json();
                    if (result.status === "success") {
                        alert("บันทึกสำเร็จ!");
                        setFormData({ Comorbidity: [], Drugs: [] });
                        setStep(1);
                    } else alert("Error: " + result.message);
                } catch (e) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); }
                setIsSubmitting(false);
            };

            const fetchDash = async () => {
                if (!gasUrl) return;
                setIsLoadingDash(true);
                try {
                    const res = await fetch(gasUrl);
                    setDashboardData(await res.json());
                } catch (e) { alert("ดึงข้อมูล Dashboard ล้มเหลว"); }
                setIsLoadingDash(false);
            };

            const fetchAdminList = async () => {
                setAdminLoading(true);
                try {
                    const res = await fetch(gasUrl);
                    setAdminList(await res.json());
                } catch(e) { alert("โหลดข้อมูลล้มเหลว"); }
                setAdminLoading(false);
            };

            const doAdminLogin = () => {
                if (adminUser === "admin" && adminPass === "1234") {
                    setAdminLoggedIn(true);
                    fetchAdminList();
                } else { alert("Username หรือ Password ไม่ถูกต้อง"); }
            };

            const saveLabData = async (rowIndex) => {
                setLabSaving(true);
                try {
                    const payload = { action: "update", rowIndex, ...labEdit };
                    const res = await fetch(gasUrl, { method: "POST", body: JSON.stringify(payload), headers: { "Content-Type": "text/plain;charset=utf-8" }});
                    const result = await res.json();
                    if (result.status === "success") {
                        setAdminList(prev => { const u=[...prev]; u[rowIndex]={...u[rowIndex],...labEdit}; return u; });
                        setLabEdit({});
                        alert("บันทึกสำเร็จ!");
                    } else alert("Error: " + result.message);
                } catch(e) { alert("เกิดข้อผิดพลาด"); }
                setLabSaving(false);
            };

            // Components
            const QC = ({ name, options, value }) => (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2 mt-2">
                    {options.map(o => (
                        <button key={o.val} type="button" onClick={() => hQS(name, o.val)}
                            className={`btn-select p-3 rounded-xl border-2 text-sm text-left md:text-center
                                ${value === o.val ? 'border-blue-600 bg-blue-50 text-blue-700 font-bold' : 'border-gray-200 bg-white text-gray-700 hover:border-blue-300'}`}>
                            {o.label}
                        </button>
                    ))}
                </div>
            );

            const MultiC = ({ name, options, values }) => (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mt-2">
                    {options.map(o => {
                        const active = (values || []).includes(o.val);
                        return (
                            <button key={o.val} type="button" onClick={() => handleCheckbox(name, o.val)}
                                className={`btn-select p-3 rounded-xl border-2 text-sm text-left flex items-center gap-2
                                    ${active ? 'border-green-600 bg-green-50 text-green-700 font-bold' : 'border-gray-200 bg-white text-gray-700 hover:border-green-300'}`}>
                                <div className={`w-5 h-5 rounded border flex items-center justify-center ${active ? 'bg-green-600 border-green-600 text-white' : 'border-gray-300'}`}>
                                    {active && "✓"}
                                </div>
                                {o.label}
                            </button>
                        )
                    })}
                </div>
            );

            const Likert = ({ qs, scaleLabels = ["ไม่เคยปฏิบัติ (1)", "ปฏิบัติน้อยครั้ง (2)", "ปฏิบัติบางครั้ง (3)", "ปฏิบัติบ่อยครั้ง (4)", "ปฏิบัติทุกครั้ง (5)"], vals = ["1","2","3","4","5"], reverseColors=false }) => (
                <div className="space-y-4">
                    {qs.map((q) => (
                        <div key={q.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <p className="font-medium text-gray-800 mb-3">{q.text}</p>
                            <div className="flex justify-between gap-1">
                                {vals.map((v, i) => {
                                    const active = formData[q.id] === v;
                                    let activeColor = reverseColors ? 'border-orange-500 bg-orange-500' : 'border-blue-600 bg-blue-600';
                                    return (
                                        <button key={v} type="button" onClick={() => hQS(q.id, v)}
                                            className={`btn-select flex-1 py-3 px-1 rounded-xl border-2 font-bold flex flex-col items-center justify-center min-h-[3.5rem]
                                                ${active ? `${activeColor} text-white shadow-md transform scale-105` : 'border-gray-200 bg-gray-50 text-gray-600'}`}>
                                            <span className="text-xl">{v}</span>
                                            <span className="likert-label text-[9px] text-center leading-tight mt-0.5 px-0.5">{scaleLabels[i]}</span>
                                        </button>
                                    )
                                })}
                            </div>
                        </div>
                    ))}
                </div>
            );

            const TrueFalse = ({ qs }) => (
                <div className="space-y-3">
                    {qs.map(q => (
                        <div key={q.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                            <p className="font-medium text-gray-800 mb-3">{q.text}</p>
                            <div className="flex gap-3">
                                {[{v:"ถูก", c:"green", bg:"bg-green-500", border:"border-green-500"}, {v:"ผิด", c:"red", bg:"bg-red-500", border:"border-red-500"}].map(opt => (
                                    <button key={opt.v} type="button" onClick={() => hQS(q.id, opt.v)}
                                        className={`btn-select flex-1 py-3 rounded-xl border-2 text-base font-bold transition-all
                                            ${formData[q.id] === opt.v ? `${opt.bg} ${opt.border} text-white shadow-md` : 'border-gray-200 bg-gray-50 text-gray-600'}`}>
                                        {opt.v}
                                    </button>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );

            // --- Views ---
            const rStep = () => {
                switch(step) {
                    case 0: return (
                        <div className="space-y-4 pb-4">
                            {/* Header */}
                            <div className="bg-blue-800 text-white p-5 rounded-2xl text-center shadow-lg">
                                <p className="text-blue-200 text-xs font-bold tracking-widest uppercase mb-1">Participant Information Sheet</p>
                                <h1 className="text-xl md:text-2xl font-bold leading-tight">เอกสารชี้แจงข้อมูล<br />สำหรับผู้เข้าร่วมการวิจัย</h1>
                            </div>

                            {/* Research title */}
                            <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl">
                                <p className="text-xs font-bold text-blue-700 uppercase tracking-wide mb-2">โครงการวิจัยเรื่อง</p>
                                <p className="font-bold text-blue-900 leading-relaxed text-sm md:text-base">
                                    "ปัจจัยด้านพฤติกรรมสุขภาพและการปฏิบัติตามคำแนะนำทางการแพทย์ที่มีความสัมพันธ์กับการควบคุมระดับไขมันในเลือดของผู้ป่วยที่มีภาวะไขมันในเลือดสูง โรงพยาบาลร้อยเอ็ด"
                                </p>
                                <div className="mt-3 pt-3 border-t border-blue-200 space-y-1">
                                    <p className="text-sm text-gray-700"><span className="font-bold">ผู้วิจัย:</span> แพทย์หญิงกรกมล ทาบึงการ</p>
                                    <p className="text-sm text-gray-700"><span className="font-bold">สังกัด:</span> ศูนย์ส่งเสริมสุขภาพ (Wellness Center) โรงพยาบาลร้อยเอ็ด</p>
                                </div>
                            </div>

                            {/* Info sections */}
                            {[
                                { num:"1", title:"วัตถุประสงค์ของการวิจัย",
                                  text:"การวิจัยนี้มีวัตถุประสงค์เพื่อศึกษาปัจจัยด้านพฤติกรรมสุขภาพ การปฏิบัติตามคำแนะนำทางการแพทย์ ความรู้และการรับรู้ด้านสุขภาพ และแรงสนับสนุนทางสังคมที่มีความสัมพันธ์กับการควบคุมระดับไขมันในเลือดของผู้ป่วยที่มีภาวะไขมันในเลือดสูง โรงพยาบาลร้อยเอ็ด เพื่อนำผลที่ได้ไปพัฒนาแนวทางการดูแลผู้ป่วยกลุ่มนี้ให้มีประสิทธิภาพยิ่งขึ้น" },
                                { num:"2", title:"ขั้นตอนการวิจัย",
                                  text:"หากท่านตกลงเข้าร่วมการวิจัยนี้ ท่านจะได้รับแบบสอบถามจำนวน 6 ส่วน ประกอบด้วย ข้อมูลส่วนบุคคล พฤติกรรมสุขภาพ การปฏิบัติตามคำแนะนำทางการแพทย์ ความรู้และการรับรู้ด้านสุขภาพ แรงสนับสนุนทางสังคม และปัญหาอุปสรรคที่พบ โดยใช้เวลาประมาณ 25–35 นาที ขณะรอพบแพทย์ที่ศูนย์ส่งเสริมสุขภาพ นอกจากนี้ ผู้วิจัยจะทำการบันทึกผลตรวจทางห้องปฏิบัติการจากเวชระเบียนของท่านเพิ่มเติม" },
                                { num:"3", title:"ความเสี่ยงที่อาจเกิดขึ้น",
                                  text:"การวิจัยนี้มีความเสี่ยงต่ำมาก อาจมีความไม่สะดวกหรือรู้สึกเหนื่อยล้าบ้างในการตอบแบบสอบถาม หากท่านรู้สึกไม่สบายหรือต้องการพัก สามารถแจ้งผู้วิจัยเพื่อหยุดพักหรือยุติการเก็บข้อมูลได้ทันที โดยไม่มีผลกระทบต่อการรักษาพยาบาลแต่อย่างใด" },
                                { num:"4", title:"ประโยชน์ที่คาดว่าจะได้รับ",
                                  text:"ข้อมูลที่ได้จากการวิจัยจะเป็นประโยชน์ในการพัฒนาระบบการดูแลผู้ป่วยภาวะไขมันในเลือดสูงของโรงพยาบาลร้อยเอ็ด และเป็นแนวทางส่งเสริมพฤติกรรมสุขภาพที่ถูกต้องในระดับจังหวัดและระดับประเทศต่อไป" },
                                { num:"5", title:"การเข้าร่วมและการถอนตัว",
                                  text:"การเข้าร่วมการวิจัยนี้เป็นไปโดยความสมัครใจ ท่านมีสิทธิ์ปฏิเสธการเข้าร่วมหรือถอนตัวได้ทุกขณะ โดยไม่ต้องให้เหตุผล และไม่มีผลกระทบต่อการรักษาพยาบาลที่ท่านจะได้รับต่อไปแต่อย่างใด" },
                                { num:"6", title:"การรักษาความลับ",
                                  text:"ข้อมูลส่วนตัวของท่านจะถูกเก็บรักษาเป็นความลับอย่างเคร่งครัด โดยจะใช้รหัสแทนชื่อและนามสกุลจริงในทุกขั้นตอน การนำเสนอผลการวิจัยจะเป็นภาพรวมเท่านั้น ไม่มีการระบุข้อมูลส่วนบุคคลที่จะนำไปสู่การระบุตัวบุคคลได้" },
                                { num:"7", title:"ค่าใช้จ่ายและค่าตอบแทน",
                                  text:"ท่านไม่ต้องเสียค่าใช้จ่ายเพิ่มเติมในการเข้าร่วมการวิจัยนี้ และไม่มีค่าตอบแทนสำหรับการเข้าร่วมการวิจัย" },
                                { num:"8", title:"สิทธิ์ในการถามคำถาม",
                                  text:"หากท่านมีคำถามเกี่ยวกับการวิจัย ท่านสามารถสอบถามผู้วิจัยได้ตลอดเวลา หรือหากมีข้อสงสัยเกี่ยวกับสิทธิ์ในฐานะผู้เข้าร่วมการวิจัย สามารถติดต่อคณะกรรมการจริยธรรมการวิจัยในมนุษย์ โรงพยาบาลร้อยเอ็ด" },
                            ].map(s => (
                                <div key={s.num} className="info-card">
                                    <div className="flex items-start gap-2">
                                        <span className="info-num">{s.num}</span>
                                        <div>
                                            <p className="font-bold text-gray-800 text-sm md:text-base">{s.title}</p>
                                            <p className="text-sm text-gray-600 mt-1 leading-relaxed">{s.text}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}

                            {/* Questionnaire instruction */}
                            <div className="bg-gray-50 border border-gray-200 p-4 rounded-xl">
                                <p className="font-bold text-gray-700 mb-2 text-sm">คำชี้แจงสำหรับผู้ตอบแบบสอบถาม</p>
                                <p className="text-sm text-gray-600 leading-relaxed">
                                    แบบสอบถามนี้จัดทำขึ้นเพื่อการวิจัย มีวัตถุประสงค์เพื่อศึกษาปัจจัยที่มีความสัมพันธ์กับการควบคุมระดับไขมันในเลือดของผู้ป่วยโรงพยาบาลร้อยเอ็ด ข้อมูลทั้งหมดจะถูกเก็บเป็นความลับและนำเสนอในภาพรวม ไม่มีการเปิดเผยข้อมูลส่วนบุคคล การตอบแบบสอบถามเป็นไปโดยสมัครใจ และไม่มีผลกระทบต่อการรักษาพยาบาลของท่านแต่อย่างใด <strong>กรุณาตอบตามความเป็นจริงให้ครบทุกข้อ</strong>
                                </p>
                            </div>

                            {/* Consent checkbox */}
                            <div className="bg-amber-50 border-2 border-amber-400 p-5 rounded-xl">
                                <p className="font-bold text-amber-800 text-center mb-3">แบบยินยอมเข้าร่วมการวิจัย</p>
                                <p className="text-sm text-gray-700 mb-4 leading-relaxed">
                                    ข้าพเจ้าได้รับการอธิบายจากผู้วิจัยถึงวัตถุประสงค์ของการวิจัย วิธีการวิจัย ความไม่สะดวกสบายที่อาจเกิดขึ้น และประโยชน์ที่จะเกิดขึ้นจากการวิจัยอย่างละเอียดแล้ว มีความเข้าใจดีแล้ว และมีสิทธิ์ที่จะบอกเลิกการเข้าร่วมเมื่อใดก็ได้โดยไม่มีผลกระทบต่อการรักษา
                                </p>
                                <label className="flex items-start gap-3 cursor-pointer">
                                    <input type="checkbox" className="w-6 h-6 mt-0.5 flex-shrink-0 cursor-pointer"
                                        checked={!!formData.Consent}
                                        onChange={e => hQS("Consent", e.target.checked)} />
                                    <span className="text-sm font-bold text-amber-900 leading-relaxed">
                                        ข้าพเจ้ายินยอมเข้าร่วมการวิจัยนี้ด้วยความสมัครใจ
                                    </span>
                                </label>
                            </div>

                            {/* Start button */}
                            <button
                                onClick={() => {
                                    if (!formData.Consent) { alert("กรุณาทำเครื่องหมาย ✓ ยินยอมเข้าร่วมการวิจัยก่อน"); return; }
                                    nextStep();
                                }}
                                className={`w-full p-5 rounded-2xl font-bold text-lg shadow-lg transition-all
                                    ${formData.Consent ? 'bg-blue-600 text-white hover:bg-blue-700 active:bg-blue-800' : 'bg-gray-300 text-gray-500'}`}>
                                {formData.Consent ? "ยินยอมแล้ว — เริ่มตอบแบบสอบถาม" : "กรุณาทำเครื่องหมาย ✓ ยินยอมก่อน"}
                            </button>

                            <p className="text-center text-xs text-gray-400">แบบสอบถามนี้เป็นส่วนหนึ่งของงานวิจัยระดับบัณฑิตศึกษา โรงพยาบาลร้อยเอ็ด ปีงบประมาณ พ.ศ. 2569</p>
                        </div>
                    );
                    case 1: return (
                        <div className="space-y-6 bg-white p-6 rounded-2xl shadow-sm border">
                            <h2 className="text-xl font-bold border-b pb-2 text-blue-800">ส่วนที่ 1: ข้อมูลปัจจัยส่วนบุคคลและโรค</h2>
                            
                            <label className="block font-bold">1. เพศ</label>
                            <QC name="Gender" value={formData.Gender} options={[{val:"ชาย",label:"ชาย"},{val:"หญิง",label:"หญิง"}]} />

                            <label className="block font-bold mt-4">2. อายุ (ปี)</label>
                            <input type="number" name="Age" value={formData.Age||""} onChange={hC}
                                className="w-32 p-3 border-2 border-gray-300 rounded-xl text-center text-lg focus:border-blue-500 focus:outline-none"
                                placeholder="ปี" min="18" max="120" />

                            <label className="block font-bold mt-4">3. ระดับการศึกษาสูงสุด</label>
                            <QC name="Education" value={formData.Education} options={[
                                {val:"ไม่ได้รับการศึกษา", label:"ไม่ได้รับการศึกษา"},
                                {val:"ประถมศึกษา",        label:"ประถมศึกษา"},
                                {val:"มัธยมศึกษา",        label:"มัธยมศึกษา"},
                                {val:"ปวช./ปวส.",         label:"ปวช. / ปวส."},
                                {val:"อนุปริญญา",         label:"อนุปริญญา"},
                                {val:"ปริญญาตรี",         label:"ปริญญาตรี"},
                                {val:"ปริญญาโท",          label:"ปริญญาโท"},
                                {val:"ปริญญาเอก",         label:"ปริญญาเอก"}
                            ]} />

                            <label className="block font-bold mt-4">4. อาชีพหลัก</label>
                            <QC name="Occupation" value={formData.Occupation} options={[
                                {val:"เกษตรกร",  label:"เกษตรกร"},
                                {val:"รับจ้าง",  label:"รับจ้างทั่วไป"},
                                {val:"ค้าขาย",   label:"ค้าขาย / ธุรกิจ"},
                                {val:"รับราชการ",label:"ราชการ / บริษัท"},
                                {val:"แม่บ้าน",  label:"แม่บ้าน / พ่อบ้าน"},
                                {val:"เกษียณ",   label:"เกษียณ"},
                                {val:"ว่างงาน",  label:"ว่างงาน"},
                                {val:"อื่นๆ",    label:"อื่น ๆ"}
                            ]} />
                            {formData.Occupation === "อื่นๆ" && (
                                <input type="text" name="Occupation_Other" value={formData.Occupation_Other||""} onChange={hC}
                                    className="w-full mt-2 p-3 border-2 border-blue-300 rounded-xl focus:outline-none focus:border-blue-500"
                                    placeholder="ระบุอาชีพ..." />
                            )}

                            <label className="block font-bold mt-4">5. รายได้ครัวเรือน/เดือน</label>
                            <QC name="Income" value={formData.Income} options={[{val:"<5k",label:"< 5,000"},{val:"5-10k",label:"5,000–10,000"},{val:"10-20k",label:"10,001–20,000"},{val:"20-30k",label:"20,001–30,000"},{val:">30k",label:"> 30,000"}]} />

                            <label className="block font-bold mt-4">6. สถานภาพสมรส</label>
                            <QC name="Marital" value={formData.Marital} options={[{val:"โสด",label:"โสด"},{val:"สมรส",label:"สมรส/อยู่ด้วยกัน"},{val:"หม้าย",label:"หม้าย/หย่า/แยก"}]} />

                            <label className="block font-bold mt-4 border-t pt-4">7. ข้อมูลร่างกาย</label>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-2">
                                <div><span className="text-xs text-gray-500">น้ำหนัก (กก.)</span><input type="number" name="Weight" value={formData.Weight||""} onChange={hC} className="w-full p-2 border rounded text-center"/></div>
                                <div><span className="text-xs text-gray-500">ส่วนสูง (ซม.)</span><input type="number" name="Height" value={formData.Height||""} onChange={hC} className="w-full p-2 border rounded text-center"/></div>
                                <div><span className="text-xs text-gray-500">รอบเอว (ซม.)</span><input type="number" name="Waist" value={formData.Waist||""} onChange={hC} className="w-full p-2 border rounded text-center"/></div>
                                <div><span className="text-xs text-gray-500">BMI</span><div className="w-full p-2 bg-gray-100 rounded text-center font-bold text-blue-700">{formData.BMI || "-"}</div></div>
                            </div>
                            <QC name="BMI_Group" value={formData.BMI_Group} options={[{val:"น้ำหนักต่ำกว่าเกณฑ์ (< 18.5)",label:"< 18.5 ผอม"},{val:"น้ำหนักปกติ (18.5–22.9)",label:"18.5-22.9 ปกติ"},{val:"น้ำหนักเกิน (23.0–24.9)",label:"23-24.9 เกิน"},{val:"โรคอ้วนระดับ 1 (25.0–29.9)",label:"25-29.9 อ้วน 1"},{val:"โรคอ้วนระดับ 2 (≥ 30.0)",label:">= 30 อ้วน 2"}]} />

                            <label className="block font-bold mt-4">8. เป็นไขมันสูงมานานเท่าใด</label>
                            <QC name="Duration" value={formData.Duration} options={[{val:"<1 ปี",label:"น้อยกว่า 1 ปี"},{val:"1-5 ปี",label:"1–5 ปี"},{val:"6-10 ปี",label:"6–10 ปี"},{val:">10 ปี",label:"มากกว่า 10 ปี"}]} />

                            <label className="block font-bold mt-4">9. โรคร่วม (ตอบได้มากกว่า 1)</label>
                            <MultiC name="Comorbidity" values={formData.Comorbidity} options={[{val:"เบาหวาน",label:"เบาหวาน"},{val:"ความดันโลหิตสูง",label:"ความดันสูง"},{val:"โรคหัวใจ",label:"โรคหัวใจ"},{val:"หลอดเลือดสมอง",label:"หลอดเลือดสมอง"},{val:"ไม่มี",label:"ไม่มีโรคร่วม"}]} />

                            <label className="block font-bold mt-4">10. สิทธิรักษา</label>
                            <QC name="Insurance" value={formData.Insurance} options={[{val:"บัตรทอง",label:"บัตรทอง"},{val:"ประกันสังคม",label:"ประกันสังคม"},{val:"ข้าราชการ",label:"ข้าราชการ"},{val:"จ่ายเอง",label:"จ่ายเอง"}]} />

                            <label className="block font-bold mt-4">11. ยาลดไขมัน (ตอบได้มากกว่า 1)</label>
                            <MultiC name="Drugs" values={formData.Drugs} options={[{val:"Statin",label:"Statin"},{val:"Ezetimibe",label:"Ezetimibe"},{val:"Fibrate",label:"Fibrate"},{val:"ไม่ทราบชื่อ",label:"กินแต่ไม่ทราบชื่อ"}]} />
                        </div>
                    );
                    case 2: return (
                        <div className="space-y-8">
                            <div className="bg-green-50 p-4 rounded-xl border border-green-200">
                                <h2 className="text-xl font-bold text-green-800">ส่วนที่ 2: พฤติกรรมสุขภาพ</h2>
                                <p className="text-sm text-green-600">ใน 1 เดือนที่ผ่านมา</p>
                            </div>
                            
                            <div><h3 className="font-bold text-lg mb-3">ด้านที่ 1: การบริโภคอาหาร</h3><Likert qs={Q_DIET} /></div>
                            <div><h3 className="font-bold text-lg mb-3 mt-6">ด้านที่ 2: การออกกำลังกาย</h3><Likert qs={Q_EXERCISE} /></div>

                            <div className="p-4 bg-orange-50 rounded-xl border border-orange-200">
                                <h3 className="font-bold text-lg mb-2 text-orange-800">ด้านที่ 3: การสูบบุหรี่</h3>
                                <QC name="Smoke_Status" value={formData.Smoke_Status} options={[{val:"ไม่เคย",label:"ไม่เคยสูบเลย"},{val:"เลิกแล้ว",label:"เคยสูบแต่เลิกแล้ว"},{val:"ยังสูบ",label:"ยังสูบอยู่"}]} />
                                {formData.Smoke_Status === "เลิกแล้ว" && (
                                    <div className="flex items-center gap-2 mt-4">
                                        เลิกมาแล้ว <input type="number" name="Smoke_Quit_Years" onChange={hC} className="w-16 p-2 border rounded text-center" placeholder="ปี" /> ปี
                                        <input type="number" name="Smoke_Quit_Months" onChange={hC} className="w-16 p-2 border rounded text-center" placeholder="เดือน" /> เดือน
                                    </div>
                                )}
                            </div>
                            {formData.Smoke_Status === "ยังสูบ" && <Likert qs={Q_SMOKE} reverseColors={true} />}

                            <div className="p-4 bg-purple-50 rounded-xl border border-purple-200 mt-6">
                                <h3 className="font-bold text-lg mb-2 text-purple-800">ด้านที่ 4: การดื่มแอลกอฮอล์</h3>
                                <QC name="Alc_Status" value={formData.Alc_Status} options={[{val:"ไม่เคย",label:"ไม่เคยดื่มเลย"},{val:"เลิกแล้ว",label:"เคยดื่มแต่เลิกแล้ว"},{val:"ยังดื่ม",label:"ยังดื่มอยู่"}]} />
                                {formData.Alc_Status === "เลิกแล้ว" && (
                                    <div className="flex items-center gap-2 mt-4">
                                        เลิกมาแล้ว <input type="number" name="Alc_Quit_Years" onChange={hC} className="w-16 p-2 border rounded text-center" placeholder="ปี" /> ปี
                                        <input type="number" name="Alc_Quit_Months" onChange={hC} className="w-16 p-2 border rounded text-center" placeholder="เดือน" /> เดือน
                                    </div>
                                )}
                            </div>
                            {formData.Alc_Status === "ยังดื่ม" && <Likert qs={Q_ALCOHOL} reverseColors={true} />}
                        </div>
                    );
                    case 3: return (
                        <div className="space-y-8">
                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-200"><h2 className="text-xl font-bold text-blue-800">ส่วนที่ 3: การปฏิบัติตามคำแนะนำทางการแพทย์ (ใน 3 เดือน)</h2></div>
                            <div><h3 className="font-bold text-lg mb-3">3.1 ความร่วมมือในการใช้ยา</h3><Likert qs={Q_COMP_MED} /></div>
                            <div><h3 className="font-bold text-lg mb-3">3.2 การมาพบแพทย์ตามนัด</h3><Likert qs={Q_COMP_APPT} /></div>
                            <div><h3 className="font-bold text-lg mb-3">3.3 การปรับเปลี่ยนวิถีชีวิต</h3><Likert qs={Q_COMP_LIFE} /></div>
                        </div>
                    );
                    case 4: return (
                        <div className="space-y-8">
                            <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-200"><h2 className="text-xl font-bold text-indigo-800">ส่วนที่ 4.1: ความรู้เกี่ยวกับภาวะไขมันในเลือดผิดปกติ</h2></div>
                            <TrueFalse qs={Q_KNOWLEDGE} />

                            <div className="bg-teal-50 p-4 rounded-xl border border-teal-200 mt-8"><h2 className="text-xl font-bold text-teal-800">ส่วนที่ 4.2: การรับรู้ด้านสุขภาพ</h2></div>
                            <div><h3 className="font-bold text-lg mb-2">1. การรับรู้โอกาสเสี่ยง</h3><Likert qs={Q_PERC_SUSC} scaleLabels={["ไม่เห็นด้วยอย่างยิ่ง","ไม่เห็นด้วย","ไม่แน่ใจ","เห็นด้วย","เห็นด้วยอย่างยิ่ง"]} /></div>
                            <div><h3 className="font-bold text-lg mb-2 mt-4">2. การรับรู้ความรุนแรง</h3><Likert qs={Q_PERC_SEV} scaleLabels={["ไม่เห็นด้วยอย่างยิ่ง","ไม่เห็นด้วย","ไม่แน่ใจ","เห็นด้วย","เห็นด้วยอย่างยิ่ง"]} /></div>
                            <div><h3 className="font-bold text-lg mb-2 mt-4">3. การรับรู้ประโยชน์</h3><Likert qs={Q_PERC_BEN} scaleLabels={["ไม่เห็นด้วยอย่างยิ่ง","ไม่เห็นด้วย","ไม่แน่ใจ","เห็นด้วย","เห็นด้วยอย่างยิ่ง"]} /></div>
                            <div><h3 className="font-bold text-lg mb-2 mt-4">4. การรับรู้อุปสรรค</h3><Likert qs={Q_PERC_BAR} scaleLabels={["ไม่เห็นด้วยอย่างยิ่ง","ไม่เห็นด้วย","ไม่แน่ใจ","เห็นด้วย","เห็นด้วยอย่างยิ่ง"]} reverseColors={true} /></div>
                            <div><h3 className="font-bold text-lg mb-2 mt-4">5. การรับรู้ความสามารถของตนเอง</h3><Likert qs={Q_PERC_EFF} scaleLabels={["ไม่เห็นด้วยอย่างยิ่ง","ไม่เห็นด้วย","ไม่แน่ใจ","เห็นด้วย","เห็นด้วยอย่างยิ่ง"]} /></div>
                        </div>
                    );
                    case 5: return (
                        <div className="space-y-8">
                            <div className="bg-pink-50 p-4 rounded-xl border border-pink-200"><h2 className="text-xl font-bold text-pink-800">ส่วนที่ 5: แรงสนับสนุนทางสังคม (ใน 1 เดือน)</h2></div>
                            <div><h3 className="font-bold text-lg mb-2">1. ด้านอารมณ์</h3><Likert qs={Q_SUPP_EMO} scaleLabels={["ไม่เห็นด้วยอย่างยิ่ง","ไม่เห็นด้วย","ไม่แน่ใจ","เห็นด้วย","เห็นด้วยอย่างยิ่ง"]} /></div>
                            <div><h3 className="font-bold text-lg mb-2 mt-4">2. ด้านการประเมิน</h3><Likert qs={Q_SUPP_APP} scaleLabels={["ไม่เห็นด้วยอย่างยิ่ง","ไม่เห็นด้วย","ไม่แน่ใจ","เห็นด้วย","เห็นด้วยอย่างยิ่ง"]} /></div>

                            </div>

                        {title:"ส่วนที่ 3: ยา (Med 1-12)", fields:Array.from({length:12},(_,i)=>[`Med_${i+1}`,`ข้อ ${i+1}`])},

                        {title:"ส่วนที่ 3: วิถีชีวิต (Life 21-30)", fields:Array.from({length:10},(_,i)=>[`Life_${i+21}`,`ข้อ ${i+21}`])},

                        {title:"ส่วนที่ 4.2: โอกาสเสี่ยง", fields:Array.from({length:5},(_,i)=>[`Perc_Susc_${i+1}`,`ข้อ ${i+1}`])},
                        {title:"ส่วนที่ 4.2: ความรุนแรง", fields:Array.from({length:5},(_,i)=>[`Perc_Sev_${i+6}`,`ข้อ ${i+6}`])},
                        {title:"ส่วนที่ 4.2: ประโยชน์", fields:Array.from({length:5},(_,i)=>[`Perc_Ben_${i+11}`,`ข้อ ${i+11}`])},

                        {title:"ส่วนที่ 4.2: Self-efficacy", fields:Array.from({length:5},(_,i)=>[`Perc_Eff_${i+21}`,`ข้อ ${i+21}`])},
                        {title:"ส่วนที่ 5: แรงสนับสนุน", fields:[...Array.from({length:5},(_,i)=>[`Supp_Emo_${i+1}`,`อารมณ์ ${i+1}`]),...Array.from({length:5},(_,i)=>[`Supp_App_${i+6}`,`ชมเชย ${i+6}`]),...Array.from({length:5},(_,i)=>[`Supp_Info_${i+11}`,`ข้อมูล ${i+11}`]),...Array.from({length:5},(_,i)=>[`Supp_Inst_${i+16}`,`ช่วยเหลือ ${i+16}`])]},
                        {title:"ส่วนที่ 6: ปัญหา/ข้อเสนอแนะ", fields:[["Prob_Control","ปัญหาควบคุม"],["Prob_Compliance","ปัญหาปฏิบัติ"],["Suggestions","ข้อเสนอแนะ"]]},

                                </div>
                                <div className={`px-3 py-2 rounded-xl text-sm font-bold ${missingCount===0?"bg-green-600":"bg-red-500"}`}>Missing: {missingCount}</div>
                            </div>
                            <div className="bg-gray-100 px-4 py-2 rounded-xl text-sm text-gray-600">
                                <span className="font-bold">บันทึกเมื่อ:</span> {p.Timestamp ? new Date(p.Timestamp).toLocaleString("th-TH") : "—"}
                            </div>
                            {/* Lab - editable */}
                            <div className="bg-white border-2 border-yellow-400 rounded-2xl p-4 shadow">
                                <h3 className="font-bold text-yellow-700 mb-3">ผลตรวจทางห้องปฏิบัติการ (แก้ไขได้)</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    {[["Lab_TC","TC (mg/dL)"],["Lab_LDL","LDL (mg/dL)"],["Lab_HDL","HDL (mg/dL)"],["Lab_TG","TG (mg/dL)"],["CV_Risk","CV Risk (%)"],["Target_LDL","Target LDL"],["Control_Status","สถานะควบคุม"]].map(([k,label])=>{

                                <button onClick={()=>saveLabData(idx)} disabled={labSaving}
                                    className="mt-4 w-full py-3 bg-green-600 text-white rounded-xl font-bold text-lg disabled:opacity-50">
                                    {labSaving?"กำลังบันทึก...":"💾 บันทึกทั้งหมด (Lab + ข้อมูลที่แก้ไข)"}
                                </button>
                            </div>
                            {/* Questionnaire sections */}
                            {sections.map(sec=>(
                                <div key={sec.title} className="bg-white border rounded-2xl p-4 shadow-sm">
                                    <h3 className="font-bold text-gray-700 mb-3 border-b pb-2 text-sm">{sec.title}</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
                                        {sec.fields.map(([k,label])=>{
                                            const miss = isMiss(k);
                                            const opt = isOpt(k);
                                            const val = p[k];
                                            const editVal = labEdit[k];
                                            const filled = editVal !== undefined && editVal !== "";
                                            return (
                                                <div key={k} className={`p-2 rounded-lg text-xs border ${miss && !filled?"bg-red-50 border-red-300":opt&&!val&&!filled?"bg-gray-50 border-gray-200":"bg-green-50 border-green-200"}`}>
                                                    <div className="font-bold text-gray-400 truncate">{k}</div>
                                                    {miss ? (
                                                        <input type="text"
                                                            value={editVal !== undefined ? editVal : ""}
                                                            onChange={e=>setLabEdit(prev=>({...prev,[k]:e.target.value}))}
                                                            placeholder="กรอก..."
                                                            className="w-full mt-1 p-1 border border-red-300 rounded text-xs focus:outline-none focus:border-blue-500 bg-white" />
                                                    ) : (
                                                        <div className={`mt-0.5 font-semibold truncate ${opt&&!val?"text-gray-400":"text-gray-800"}`}>
                                                            {val || "—"}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    );
                }

                return (
                    <div className="space-y-4 pb-16">
                        <div className="bg-blue-900 text-white p-4 rounded-2xl flex justify-between items-center">
                            <h2 className="font-bold text-xl">รายละเอียดผู้เข้าร่วมการวิจัย</h2>
                            <div className="flex gap-2">
                                <button onClick={fetchAdminList} className="px-3 py-2 bg-blue-700 rounded-xl text-sm">โหลดใหม่</button>
                                <button onClick={()=>{setAdminLoggedIn(false);setAdminUser("");setAdminPass("");setMode("form");}} className="px-3 py-2 bg-red-600 rounded-xl text-sm">ออกจากระบบ</button>
                            </div>
                        </div>
                        {adminLoading ? (
                            <div className="text-center py-12 text-gray-400 text-lg">กำลังโหลด...</div>
                        ) : (
                            <div className="bg-white rounded-2xl shadow overflow-x-auto">
                                <table className="w-full text-sm min-w-[600px]">
                                    <thead>
                                        <tr className="bg-blue-800 text-white">
                                            <th className="p-3 text-left">#</th>
                                            <th className="p-3 text-left">วันที่</th>
                                            <th className="p-3 text-center">เพศ</th>
                                            <th className="p-3 text-center">อายุ</th>
                                            <th className="p-3 text-center">TC</th>
                                            <th className="p-3 text-center">LDL</th>
                                            <th className="p-3 text-center">HDL</th>
                                            <th className="p-3 text-center">TG</th>
                                            <th className="p-3 text-center">Missing</th>
                                            <th className="p-3 text-center">ดู</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {adminList.length===0 ? (
                                            <tr><td colSpan={10} className="text-center p-8 text-gray-400">ยังไม่มีข้อมูล</td></tr>
                                        ) : adminList.map((pt,i)=>{
                                            const labMiss = [pt.Lab_TC,pt.Lab_LDL,pt.Lab_HDL,pt.Lab_TG].filter(v=>!v).length;
                                            return (
                                                <tr key={i} className={`border-b ${i%2===0?"bg-white":"bg-gray-50"} hover:bg-blue-50 transition-colors`}>

                                                    <td className="p-3 text-center">{pt.Age||"—"}</td>
                                                    <td className={`p-3 text-center font-bold ${pt.Lab_TC?"text-gray-800":"text-red-400"}`}>{pt.Lab_TC||"—"}</td>
                                                    <td className={`p-3 text-center font-bold ${pt.Lab_LDL?"text-gray-800":"text-red-400"}`}>{pt.Lab_LDL||"—"}</td>
                                                    <td className={`p-3 text-center font-bold ${pt.Lab_HDL?"text-gray-800":"text-red-400"}`}>{pt.Lab_HDL||"—"}</td>
                                                    <td className={`p-3 text-center font-bold ${pt.Lab_TG?"text-gray-800":"text-red-400"}`}>{pt.Lab_TG||"—"}</td>
                                                    <td className="p-3 text-center">
                                                        <span className={`px-2 py-1 rounded-full text-xs font-bold ${labMiss===0?"bg-green-100 text-green-700":"bg-red-100 text-red-600"}`}>{labMiss===0?"✓":labMiss+" lab"}</span>
                                                    </td>
                                                    <td className="p-3 text-center">

                                <div className="p-3 text-sm text-gray-500 border-t bg-gray-50">
                                    ทั้งหมด <strong>{adminList.length}</strong> ราย | Lab ครบ: <strong>{adminList.filter(pt=>pt.Lab_TC&&pt.Lab_LDL&&pt.Lab_HDL&&pt.Lab_TG).length}</strong> ราย
                                </div>
